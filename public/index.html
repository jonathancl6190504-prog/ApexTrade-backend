<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ApexTrade Dashboard</title>
  <style>
 * { box-sizing: border-box; margin: 0; padding: 0; }
 body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
 header { background: #161b22; border-bottom: 1px solid #30363d; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
 header h1 { font-size: 20px; font-weight: 700; color: #58a6ff; }
 .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #3fb950; display: inline-block; margin-right: 6px; }
 .status-dot.off { background: #f85149; }
 main { max-width: 900px; margin: 0 auto; padding: 24px 16px; }
 .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
 .card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 20px; }
 .card label { font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: .05em; }
 .card .value { font-size: 26px; font-weight: 700; margin-top: 6px; }
 .green { color: #3fb950; }
 .red { color: #f85149; }
 .section { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 20px; margin-bottom: 24px; }
 .section h2 { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: #8b949e; text-transform: uppercase; letter-spacing: .05em; }
 .trade-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
 .trade-row input { background: #0d1117; border: 1px solid #30363d; color: #e6edf3; border-radius: 6px; padding: 10px 12px; font-size: 14px; flex: 1; min-width: 120px; outline: none; }
 .trade-row input:focus { border-color: #58a6ff; }
 .btn { padding: 10px 20px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .15s; }
 .btn:hover { opacity: .85; }
 .btn-buy { background: #3fb950; color: #000; }
 .btn-sell { background: #f85149; color: #fff; }
 .btn-danger { background: #b91c1c; color: #fff; }
 .btn-start { background: #58a6ff; color: #000; }
 .btn-stop { background: #8b949e; color: #000; }
 .btn-sub { background: #a371f7; color: #fff; width: 100%; padding: 14px; font-size: 16px; margin-top: 8px; border-radius: 8px; }
 table { width: 100%; border-collapse: collapse; font-size: 13px; }
 th { text-align: left; color: #8b949e; padding: 8px 10px; border-bottom: 1px solid #30363d; font-weight: 500; }
 td { padding: 10px; border-bottom: 1px solid #21262d; }
 .empty { color: #8b949e; font-size: 13px; padding: 12px 0; }
 #toast { position: fixed; bottom: 24px; right: 24px; background: #161b22; border: 1px solid #30363d; color: #e6edf3; padding: 12px 20px; border-radius: 8px; font-size: 14px; display: none; z-index: 999; max-width: 300px; }
 .bot-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
 .bot-status { font-size: 13px; color: #8b949e; }
  </style>
</head>
<body>

<header>
  <h1>⚡ ApexTrade</h1>
  <div><span class="status-dot" id="botDot"></span><span id="botStatusText" style="font-size:13px;">Loading…</span></div>
</header>

<main>

  <!-- Account Summary -->
  <div class="cards">
 <div class="card">
 <label>Balance</label>
 <div class="value" id="balance"> - </div>
 </div>
 <div class="card">
 <label>Unrealized P&L</label>
 <div class="value" id="unrealizedPnl"> - </div>
 </div>
 <div class="card">
 <label>Total Value</label>
 <div class="value" id="totalValue"> - </div>
 </div>
 <div class="card">
 <label>Open Positions</label>
 <div class="value" id="openPositions"> - </div>
 </div>
  </div>

  <!-- Bot Control -->
  <div class="section">
 <h2>Bot Control</h2>
 <div class="bot-row">
 <button class="btn btn-start" onclick="startBot()">▶ Start Bot</button>
 <button class="btn btn-stop" onclick="stopBot()">■ Stop Bot</button>
 <span class="bot-status" id="botControlStatus"></span>
 </div>
  </div>

  <!-- Trade -->
  <div class="section">
 <h2>Place Trade</h2>
 <div class="trade-row">
 <input id="symbol" placeholder="Symbol e.g. ES" />
 <input id="quantity" type="number" placeholder="Quantity" />
 <input id="price" type="number" placeholder="Price" />
 <button class="btn btn-buy" onclick="placeTrade('buy')">Buy</button>
 <button class="btn btn-sell" onclick="placeTrade('sell')">Sell</button>
 </div>
  </div>

  <!-- Open Positions -->
  <div class="section">
 <h2>Open Positions</h2>
 <div id="positionsWrap">
 <p class="empty">Loading…</p>
 </div>
 <button class="btn btn-danger" style="margin-top:14px" onclick="closeAll()">Close All Positions</button>
  </div>

  <!-- Trade History -->
  <div class="section">
 <h2>Trade History</h2>
 <div id="historyWrap">
 <p class="empty">Loading…</p>
 </div>
  </div>

  <!-- Subscribe -->
  <div class="section">
 <h2>Subscription</h2>
 <p style="font-size:13px;color:#8b949e;margin-bottom:8px;">Unlock full access for $29/month.</p>
 <button class="btn btn-sub" onclick="subscribe()">Subscribe with Stripe →</button>
  </div>

</main>

<div id="toast"></div>

<script>
  const API = '';  // same origin

  function toast(msg, err) {
 const el = document.getElementById('toast');
 el.textContent = msg;
 el.style.borderColor = err ? '#f85149' : '#3fb950';
 el.style.display = 'block';
 setTimeout(() => el.style.display = 'none', 3500);
  }

  function fmt(n) {
 return '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  async function loadAccount() {
 try {
 const r = await fetch(API + '/api/account');
 const d = await r.json();
 document.getElementById('balance').textContent = fmt(d.balance);
 const pnl = d.unrealizedPnl || 0;
 const pnlEl = document.getElementById('unrealizedPnl');
 pnlEl.textContent = fmt(pnl);
 pnlEl.className = 'value ' + (pnl >= 0 ? 'green' : 'red');
 document.getElementById('totalValue').textContent = fmt(d.totalValue);
 document.getElementById('openPositions').textContent = d.openPositions;
 } catch(e) { console.error('account', e); }
  }

  async function loadPositions() {
 try {
 const r = await fetch(API + '/api/positions');
 const d = await r.json();
 const wrap = document.getElementById('positionsWrap');
 if (!d.length) { wrap.innerHTML = '<p class="empty">No open positions.</p>'; return; }
 wrap.innerHTML = `<table>
 <tr><th>Symbol</th><th>Side</th><th>Qty</th><th>Entry</th><th>Current</th><th>P&L</th></tr>
 ${d.map(p => `<tr>
 <td>${p.symbol}</td><td>${p.side}</td><td>${p.quantity}</td>
 <td>${fmt(p.entryPrice)}</td><td>${fmt(p.currentPrice)}</td>
 <td class="${(p.unrealizedPnl||0)>=0?'green':'red'}">${fmt(p.unrealizedPnl||0)}</td>
 </tr>`).join('')}
 </table>`;
 } catch(e) { console.error('positions', e); }
  }

  async function loadHistory() {
 try {
 const r = await fetch(API + '/api/history');
 const d = await r.json();
 const wrap = document.getElementById('historyWrap');
 if (!d.length) { wrap.innerHTML = '<p class="empty">No trades yet.</p>'; return; }
 wrap.innerHTML = `<table>
 <tr><th>Symbol</th><th>Qty</th><th>Entry</th><th>Exit</th><th>P&L</th><th>Closed</th></tr>
 ${d.slice().reverse().map(h => `<tr>
 <td>${h.symbol}</td><td>${h.quantity}</td>
 <td>${fmt(h.entryPrice)}</td><td>${fmt(h.exitPrice)}</td>
 <td class="${(h.realizedPnl||0)>=0?'green':'red'}">${fmt(h.realizedPnl||0)}</td>
 <td>${new Date(h.closedAt).toLocaleDateString()}</td>
 </tr>`).join('')}
 </table>`;
 } catch(e) { console.error('history', e); }
  }

  async function loadBotStatus() {
 try {
 const r = await fetch(API + '/health');
 const d = await r.json();
 const running = d.botRunning;
 document.getElementById('botDot').className = 'status-dot ' + (running ? '' : 'off');
 document.getElementById('botStatusText').textContent = running ? 'Bot Running' : 'Bot Stopped';
 } catch(e) {
 document.getElementById('botStatusText').textContent = 'Offline';
 document.getElementById('botDot').className = 'status-dot off';
 }
  }

  async function startBot() {
 try {
 const r = await fetch(API + '/api/bot/start', { method: 'POST' });
 const d = await r.json();
 toast('Bot started ✓');
 loadBotStatus();
 } catch(e) { toast('Failed to start bot', true); }
  }

  async function stopBot() {
 try {
 await fetch(API + '/api/bot/stop', { method: 'POST' });
 toast('Bot stopped');
 loadBotStatus();
 } catch(e) { toast('Failed to stop bot', true); }
  }

  async function placeTrade(side) {
 const symbol = document.getElementById('symbol').value.trim().toUpperCase();
 const quantity = parseFloat(document.getElementById('quantity').value);
 const price = parseFloat(document.getElementById('price').value);
 if (!symbol || !quantity || !price) { toast('Fill in symbol, quantity, and price', true); return; }
 try {
 const r = await fetch(API + '/api/trade/' + side, {
 method: 'POST',
 headers: { 'Content-Type': 'application/json' },
 body: JSON.stringify({ symbol, quantity, price })
 });
 const d = await r.json();
 if (!r.ok) { toast(d.error || 'Trade failed', true); return; }
 toast(side.toUpperCase() + ' order placed ✓');
 loadAccount(); loadPositions();
 } catch(e) { toast('Trade error', true); }
  }

  async function closeAll() {
 if (!confirm('Close all open positions?')) return;
 try {
 const r = await fetch(API + '/api/trade/close-all', { method: 'POST' });
 const d = await r.json();
 toast('All positions closed ✓');
 loadAccount(); loadPositions(); loadHistory();
 } catch(e) { toast('Failed to close positions', true); }
  }

  async function subscribe() {
 try {
 const r = await fetch(API + '/api/subscribe', { method: 'POST' });
 const d = await r.json();
 if (d.url) { window.location.href = d.url; }
 else { toast('Could not start checkout', true); }
 } catch(e) { toast('Subscription error', true); }
  }

  function refresh() {
 loadAccount(); loadPositions(); loadHistory(); loadBotStatus();
  }

  refresh();
  setInterval(refresh, 10000);  // auto-refresh every 10 seconds
</script>

</body>
</html>
